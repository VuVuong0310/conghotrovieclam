version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: jobportal-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - jobportal-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: jobportal-backend
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      JOBPORTAL_JWTSECRET: ${JWT_SECRET}
      JOBPORTAL_JWTEXPIRATIONMS: ${JWT_EXPIRATION_MS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - jobportal-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.cloudflare
      args:
        REACT_APP_API_URL: /jobportal/api
        REACT_APP_BASE_PATH: /jobportal
    container_name: jobportal-frontend
    # Chỉ expose nội bộ, cloudflared sẽ tunnel vào port 80
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - jobportal-net
    restart: unless-stopped

  # Cloudflare Tunnel - kết nối máy bạn với Cloudflare, không cần mở port router
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: jobportal-cloudflared
    command: tunnel --no-autoupdate --protocol http2 run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    network_mode: "service:frontend"
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  mysql_data:
  backend_uploads:

networks:
  jobportal-net:
    driver: bridge
